services:
  postgres:
    image: postgres:16-alpine
    container_name: ordersystem-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ordersystem
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ordersystem"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ordersystem-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: apache/kafka:3.7.2
    container_name: ordersystem-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  migrator:
    build:
      context: .
      dockerfile: ./docker/Migrator.Dockerfile
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy

  gateway:
    build:
      context: .
      dockerfile: ./docker/Dockerfile
      args:
        SERVICE_PATH: services/gateway
    env_file: .env
    environment:
      PORT: 4000
    ports:
      - "4000:4000"
    depends_on:
      migrator:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: ./docker/Frontend.Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:4000
    environment:
      PORT: 4173
    ports:
      - "4173:4173"
    depends_on:
      gateway:
        condition: service_started

  auth-service:
    build:
      context: .
      dockerfile: ./docker/Dockerfile
      args:
        SERVICE_PATH: services/auth-service
    env_file: .env
    environment:
      PORT: 4001
    depends_on:
      migrator:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  order-service:
    build:
      context: .
      dockerfile: ./docker/Dockerfile
      args:
        SERVICE_PATH: services/order-service
    env_file: .env
    environment:
      PORT: 4002
    depends_on:
      migrator:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  processing-service:
    build:
      context: .
      dockerfile: ./docker/Dockerfile
      args:
        SERVICE_PATH: services/processing-service
    env_file: .env
    environment:
      PORT: 4003
    depends_on:
      migrator:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  notification-service:
    build:
      context: .
      dockerfile: ./docker/Dockerfile
      args:
        SERVICE_PATH: services/notification-service
    env_file: .env
    environment:
      PORT: 4004
    depends_on:
      migrator:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

volumes:
  postgres-data:
